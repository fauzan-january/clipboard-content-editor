name = ClipboardContentEditor
summary = "Clipboard Content Editor"
description = """A powerful clipboard editor and manager for NVDA users. Review, analyze, edit, and manage clipboard content before pasting. Use Ctrl+Alt+C to activate the command layer and press F1 to show the list of available commands."""
author = "Fauzan January <surel@fauzanaja.com>"
url = https://fauzanaja.com/nvda-addon/
version = 1.3.0
changelog = """- Added full compatibility for NVDA 2026.1 (Python 64-bit).
- Refactored all global shortcuts into a unified Command Layer (Ctrl+Alt+C) to prevent conflicts. Press F1 after the command layer trigger to view all available commands.
- Introduced an unlimited Clipboard History manager with complete CRUD capabilities (H in the command layer).
- Added Append Mode (A in the command layer) to seamlessly collect multiple texts by concatenating new copies.
- Restructured the Editor dialog by moving tools into a dedicated Tools menu.
- Restored the ability to speak clipboard content without character limit (S in the command layer).
- Added settings to configure the maximum Clipboard History size and override the addon's display language independently of NVDA.
- Fixed a bug where the Editor dialog would freeze or hang after successfully saving a file via 'Save As...'.
- Integrated a Development Support (PayPal donation) dialog into the installation flow.- Added paragraph counting to the Information feature (characters, words, lines, and paragraphs)."""
docFileName = readme.html
minimumNVDAVersion = 2024.1
lastTestedNVDAVersion = 2026.1
updateChannel = None
